; =============================================================================
; iCan Cane Firmware — PlatformIO Configuration
; =============================================================================

; ---------------------------------------------------------------------------
; Shared settings inherited by all environments
; ---------------------------------------------------------------------------
[env]
build_flags =
    -I../shared/include
    -DCORE_DEBUG_LEVEL=3

lib_deps =
    h2zero/NimBLE-Arduino@^2.1.0
    adafruit/Adafruit DRV2605 Library@^1.2.4
    adafruit/Adafruit LSM6DS@^4.7.3
    adafruit/Adafruit BusIO@^1.16.2
    adafruit/Adafruit GPS Library@^1.7.4
    Wire

monitor_speed = 115200

; =============================================================================
; ESP32-WROOM-32 (current hardware)
; =============================================================================
[env:wroom32]
platform = espressif32
board = esp32dev
framework = arduino
build_src_filter = +<*> -<gps_test_main.cpp>

; =============================================================================
; Arduino Nano ESP32 (future target)
; =============================================================================
[env:nano_esp32]
platform = espressif32
board = arduino_nano_esp32
framework = arduino
build_src_filter = +<*> -<gps_test_main.cpp>

; =============================================================================
; GPS Test — WROOM-32
; =============================================================================
[env:test_gps]
platform = espressif32
board = esp32dev
framework = arduino
build_src_filter = +<gps_test_main.cpp> -<main.cpp>
