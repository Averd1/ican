; =============================================================================
; iCan Cane Firmware — PlatformIO Configuration
; Target: Arduino Nano ESP32
; =============================================================================

[env:nano_esp32]
platform = espressif32
board = arduino_nano_esp32
framework = arduino
build_src_filter = +<*> -<gps_test_main.cpp>

; Use the shared protocol header
build_flags =
    -I../../shared
    -DCORE_DEBUG_LEVEL=3

; Libraries
lib_deps =
    h2zero/NimBLE-Arduino@^2.1.0
    adafruit/Adafruit DRV2605 Library@^1.2.4
    adafruit/Adafruit LSM6DS@^4.7.3
    adafruit/Adafruit BusIO@^1.16.2
    adafruit/Adafruit GPS Library@^1.7.4
    Wire

; Monitor settings
monitor_speed = 115200

; =============================================================================
; GPS Test Environment
; =============================================================================
[env:test_gps]
platform = espressif32
board = arduino_nano_esp32
framework = arduino
build_flags =
    -I../../shared
    -DCORE_DEBUG_LEVEL=3
lib_deps =
    ${env:nano_esp32.lib_deps}
build_src_filter = +<gps_test_main.cpp> -<main.cpp>
monitor_speed = 115200
