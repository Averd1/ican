; =============================================================================
; iCan Eye Firmware — PlatformIO Configuration
; Target: Seeed XIAO ESP32-S3 Sense
; =============================================================================

[env:xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
build_src_filter = +<main.cpp>

; Use the shared protocol header
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM

; Libraries
lib_deps =
    h2zero/NimBLE-Arduino@^2.1.0
    symlink://C:/Users/17733/ican/firmware/shared



; Camera support is built into the ESP32-S3 Arduino core
; No extra lib needed — uses esp_camera.h

monitor_speed = 115200


; =============================================================================
; Test Environments
; =============================================================================

[env:test_camera]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
build_flags =
    -I ../../shared
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM
build_src_flags =
    -I ../../shared
build_src_filter = +<camera_test_main.cpp> -<main.cpp> -<ble_stream_test_main.cpp>
monitor_speed = 115200

[env:test_ble_stream]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
build_flags =
    -I ../../shared
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM
build_src_flags =
    -I ../../shared
lib_deps =
    ${env:xiao_esp32s3.lib_deps}
    symlink://C:/Users/17733/ican/firmware/shared
build_src_filter = +<ble_stream_test_main.cpp> -<main.cpp> -<camera_test_main.cpp>
monitor_speed = 115200
