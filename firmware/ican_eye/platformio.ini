; =============================================================================
; iCan Eye Firmware — PlatformIO Configuration
; Target: Seeed XIAO ESP32-S3 Sense
; =============================================================================

[env:xiao_esp32s3]
platform = espressif32@6.13.0
board = seeed_xiao_esp32s3
framework = arduino
build_src_filter = +<main.cpp> -<*.ino> -<*.py>

; Use the shared protocol header
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; Libraries
; Standard ESP32 BLEDevice library is built into the Arduino framework
lib_deps =
    symlink://C:/Users/17733/ican/firmware/shared



; Camera support is built into the ESP32-S3 Arduino core
; No extra lib needed — uses esp_camera.h

monitor_speed = 115200


; =============================================================================
; Test Environments
; =============================================================================

[env:test_camera]
platform = espressif32@6.13.0
board = seeed_xiao_esp32s3
framework = arduino
build_flags =
    -I ../../shared
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM
build_src_flags =
    -I ../../shared
build_src_filter = +<camera_test_main.cpp> -<main.cpp> -<ble_stream_test_main.cpp> -<*.ino> -<*.py>
monitor_speed = 115200

[env:test_ble_stream]
platform = espressif32@6.13.0
board = seeed_xiao_esp32s3
framework = arduino
build_flags =
    -I ../../shared
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
build_src_flags =
    -I ../../shared
lib_deps =
    ${env:xiao_esp32s3.lib_deps}
build_src_filter = +<ble_stream_test_main.cpp> -<main.cpp> -<camera_test_main.cpp> -<*.ino> -<*.py>
monitor_speed = 115200

[env:test_blink]
platform = espressif32@6.13.0
board = seeed_xiao_esp32s3
framework = arduino
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
build_src_filter = +<blink_test.cpp> -<main.cpp> -<camera_test_main.cpp> -<ble_stream_test_main.cpp> -<*.ino> -<*.py>
monitor_speed = 115200
